global:
  scrape_interval: 10s
  external_labels:
    monitor: 'local_monitor'

scrape_configs:


  - job_name: 'node-app'
    metrics_path: /app-metrics/
    static_configs:
      - targets: ['node:3000']

  - job_name: 'docker'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['docker.for.mac.host.internal:9323']
